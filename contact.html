<!DOCTYPE html>
<html lang="es" class="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
  <title>Contacto | Ecuador a la Carta</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&family=Playfair+Display:ital,wght@0,400;0,900;1,400;1,900&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
    <style>
    :root {
      --luxury-dark: #070B14; /* Más profundo, casi vantablack */
      --ec-gold: #DCA011;
      --gold-gradient: linear-gradient(135deg, #FFEAA7 0%, #DCA011 40%, #8B6914 100%);
      --glass-bg: rgba(255, 255, 255, 0.02);
      --glass-border: rgba(255, 255, 255, 0.05);
      --gold-glow: rgba(220, 160, 17, 0.15);
    }

    /* ====== Scrollbar Personalizado ====== */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: var(--luxury-dark); }
    ::-webkit-scrollbar-thumb {
      background: var(--glass-border);
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb:hover { background: var(--ec-gold); }

    body {
      background-color: var(--luxury-dark);
      color: #F8FAFC;
      overflow-x: hidden;
      scroll-behavior: smooth;
    }

    ::selection {
      background: rgba(220, 160, 17, 0.3);
      color: #ffffff;
    }

    .glass-card {
      background: var(--glass-bg);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--glass-border);
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
    }

    .hero-title {
      font-family: 'Playfair Display', serif;
      line-height: 0.95;
      letter-spacing: -0.05em;
    }

    .gold-text-gradient {
      background: var(--gold-gradient);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      color: transparent;
      display: inline-block;
    }

    .btn-luxury {
      background: var(--gold-gradient);
      color: #0B1221;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      position: relative;
      overflow: hidden;
      z-index: 1;
    }

    .btn-luxury::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 50%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.5), transparent);
      transform: skewX(-20deg);
      transition: 0.6s cubic-bezier(0.16, 1, 0.3, 1);
      z-index: -1;
    }

    .btn-luxury:hover::before {
      left: 150%;
    }

    .btn-luxury:hover {
      transform: translateY(-4px) scale(1.03);
      box-shadow: 0 20px 40px rgba(220, 160, 17, 0.5);
    }

    .skip-link {
      position: fixed;
      top: -100px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--ec-gold);
      color: var(--luxury-dark);
      padding: 1rem 2rem;
      font-weight: bold;
      z-index: 1000;
      border-radius: 0 0 1rem 1rem;
      transition: top 0.3s ease;
    }

    .skip-link:focus {
      top: 0;
    }
  </style>

    <!-- Canonical URL (SEO 9) -->
    <link rel="canonical" href="https://ecuadoralacarta.com/contact.html" />
    
    <!-- Language & Alternate (SEO 10) -->
    <link rel="alternate" hreflang="es-EC" href="https://ecuadoralacarta.com/contact.html" />

    <!-- Open Graph (SEO 3) -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://ecuadoralacarta.com/contact.html">
    <meta property="og:title" content="Contacto | Ecuador a la Carta">
    <meta property="og:description" content="La revista premium de gastronomía ecuatoriana. Recetas auténticas, guías para la diáspora y rutas turísticas gastronómicas del Ecuador.">
    <meta property="og:locale" content="es_EC">
    <meta property="og:site_name" content="Ecuador a la Carta">

    <!-- Twitter (SEO 4) -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://ecuadoralacarta.com/contact.html">
    <meta property="twitter:title" content="Contacto | Ecuador a la Carta">
    <meta property="twitter:description" content="La revista premium de gastronomía ecuatoriana. Recetas auténticas, guías para la diáspora y rutas turísticas gastronómicas del Ecuador.">

    
    <!-- Schema.org JSON-LD (SEO 5 & 6) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Ecuador a la Carta",
      "url": "https://ecuadoralacarta.com",
      "logo": "https://ecuadoralacarta.com/LogoEcuadorAlacarta.png",
      "sameAs": [
        "https://www.facebook.com/ecuadoralacarta",
        "https://www.instagram.com/ecuadoralacarta"
      ]
    }
    </script>


    <!-- Preconnect (SEO 14) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

</head>

<body class="dark-theme">
  <!-- PREMIUM HEADER V3.5 -->
  <header class="fixed top-0 left-0 right-0 z-[100] transition-all duration-500 py-6 px-6">
    <div class="max-w-[1400px] mx-auto flex items-center justify-between glass-card rounded-[32px] px-8 py-4">
      <a href="/" class="flex items-center gap-3">
        <div
          class="w-10 h-10 rounded-xl bg-gradient-to-br from-ec-gold to-[#B8860B] flex items-center justify-center text-xl">
          🇪🇨</div>
        <div class="flex flex-col">
          <span class="text-white font-black uppercase tracking-tighter text-lg leading-none">Ecuador</span>
          <span class="text-ec-gold font-bold text-[10px] tracking-[0.2em] leading-none uppercase">A LA CARTA.</span>
        </div>
      </a>
      <div class="flex items-center gap-4">
        <button id="theme-toggle"
          class="p-3 bg-white/5 rounded-xl hover:bg-white/10 transition-all group overflow-hidden relative">
          <div class="theme-sun transition-transform duration-500 group-[.light-theme]:translate-y-12">☀️</div>
          <div
            class="theme-moon absolute transition-transform duration-500 translate-y-12 group-[.dark-theme]:translate-y-0 text-white">
            🌙</div>
        </button>
        <button id="nav-toggle" class="p-3 bg-white/5 rounded-xl hover:bg-white/10 transition-colors"><svg
            class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8h16M4 16h16" />
          </svg></button>
      </div>
    </div>
  </header>

  <main class="pt-48">
    <section class="max-w-7xl mx-auto px-6 mb-24 text-center" data-aos="fade-up">
      <span class="text-ec-gold font-black text-[10px] tracking-[0.6em] uppercase mb-8 block font-black">Canal
        Abierto</span>
      <h1 class="hero-title text-6xl md:text-9xl text-white tracking-tighter mb-12 uppercase leading-none">Punto de
        <br><span class="gold-text-gradient italic font-serif">Colaboración.</span></h1>
    </section>

    <section class="max-w-[1200px] mx-auto px-6 py-24">
      <div class="grid grid-cols-1 lg:grid-cols-12 gap-12">
        <div class="lg:col-span-8 glass-card p-12 md:p-20 rounded-[56px]" data-aos="fade-right">
          <form class="space-y-12">
            <div class="grid md:grid-cols-2 gap-12">
              <div class="space-y-4"><label
                  class="text-[9px] font-black text-ec-gold uppercase tracking-[0.3em] block">Nombre</label><input
                  type="text" placeholder="Tu nombre..."
                  class="w-full bg-transparent border-b border-white/10 py-5 text-xl outline-none focus:border-ec-gold transition-all">
              </div>
              <div class="space-y-4"><label
                  class="text-[9px] font-black text-ec-gold uppercase tracking-[0.3em] block">Email</label><input
                  type="email" placeholder="maestro@chef.com"
                  class="w-full bg-transparent border-b border-white/10 py-5 text-xl outline-none focus:border-ec-gold transition-all">
              </div>
            </div>
            <div class="space-y-4"><label
                class="text-[9px] font-black text-ec-gold uppercase tracking-[0.3em] block">Mensaje</label><textarea
                rows="4" placeholder="Alguna sugerencia o mensaje..."
                class="w-full bg-transparent border-b border-white/10 py-5 text-xl outline-none focus:border-ec-gold transition-all resize-none"></textarea>
            </div>
            <button
              class="w-full md:w-fit px-16 py-6 bg-ec-gold text-white font-black text-[10px] tracking-[0.4em] uppercase rounded-2xl hover:bg-white hover:text-ec-blue transition-all">ENVIAR
              TRANSMISIÓN</button>
          </form>
        </div>
        <div class="lg:col-span-4 space-y-8" data-aos="fade-left">
          <div class="glass-card p-12 rounded-[48px] border border-ec-gold/20">
            <h4 class="text-white font-black text-[10px] tracking-widest uppercase mb-8">Partnership</h4>
            <p class="text-white/40 text-xs italic mb-8">Para patrocinadores en nuestra red de 8 sitios.</p>
            <span class="text-xs font-bold leading-none uppercase">partners@ecuadoralacarta.com</span>
          </div>
          <div class="glass-card p-12 rounded-[48px]">
            <h4 class="text-white font-black text-[10px] tracking-widest uppercase mb-6 uppercase">LOPDP</h4>
            <p class="text-[10px] text-white/30 italic">Datos protegidos por ley.</p>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer
    class="bg-black/40 pt-12 pb-8 text-center text-[9px] font-bold text-white/20 uppercase tracking-[0.5em] mt-32">©
    2026 ECUADOR A LA CARTA</footer>

  <script src="script.js"></script>
  <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
  <script>AOS.init({ duration: 1000, once: true });</script>
</body>

</html>
